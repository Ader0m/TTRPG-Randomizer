kind = "web"
previewPath = "/"
title = "CSV Mixer"
version = "1.0.0"
id = "artifacts/csv-mixer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23533

[services.development]
run = "pnpm --filter @workspace/csv-mixer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/csv-mixer", "run", "build" ]
publicDir = "artifacts/csv-mixer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23533"
BASE_PATH = "/"
